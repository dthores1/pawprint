<!doctype html>
<!--
  Whiskerville — "Email Address Changed" email.
  Paste into Supabase Dashboard → Authentication → Email Templates → Email address changed.
  Styling mirrors confirm-signup.html / send-invite-email so all emails cohere.
-->
<html>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f1eee8;padding:24px;color:#2b2b2b">
  <div style="max-width:560px;margin:0 auto;background:#fff;border:1px solid #e7e2d8;border-radius:16px;padding:32px">
    <div style="text-align:center;margin:0 0 24px">
      <img src="https://whiskerville.app/images/whiskerville-logo-minimum.png" alt="Whiskerville" width="64" style="display:block;margin:0 auto 8px;width:64px;height:auto;border:0" />
      <div style="font-size:18px;font-weight:700;color:#2b2b2b">Whiskerville</div>
    </div>

    <h1 style="font-size:22px;margin:0 0 8px">Your email address was changed</h1>

    <p style="margin:0 0 24px;color:#5a5a5a">
      The email address for your Whiskerville account was changed from 
      <strong>{{ .OldEmail }}</strong> to <strong>{{ .Email }}</strong>.
    </p>
    
    <p style="margin:24px 0 0;font-size:13px;color:#5a5a5a">
      If you made this change, no further action is needed.
    </p>

    <p style="margin:16px 0 0;font-size:12px;color:#9a9a9a">
        If you didn't make this change, contact us right away at 
        <a href="mailto:support@whiskerville.app" style="color:#9a9a9a">support@whiskerville.app</a>.
    </p>    
  </div>
</body>
</html>
