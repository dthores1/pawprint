<!doctype html>
<!--
  Whiskerville — "Reauthentication" email (one-time code).
  Paste into Supabase Dashboard → Authentication → Email Templates → Reauthentication.
  Uses the Supabase template variable {{ .Token }} (a numeric OTP, not a link).
  Styling mirrors confirm-signup.html / send-invite-email so all emails cohere.
-->
<html>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f1eee8;padding:24px;color:#2b2b2b">
  <div style="max-width:560px;margin:0 auto;background:#fff;border:1px solid #e7e2d8;border-radius:16px;padding:32px">
    <div style="text-align:center;margin:0 0 24px">
      <img src="https://whiskerville.app/images/whiskerville-logo-minimum.png" alt="Whiskerville" width="64" style="display:block;margin:0 auto 8px;width:64px;height:auto;border:0" />
      <div style="font-size:18px;font-weight:700;color:#2b2b2b">Whiskerville</div>
    </div>
    <h1 style="font-size:22px;margin:0 0 8px">Confirm it's you</h1>
    <p style="margin:0 0 24px;color:#5a5a5a">Enter this code in Whiskerville to confirm your identity:</p>
    <p style="margin:0 0 24px;text-align:center"><span style="display:inline-block;background:#f1eee8;border:1px solid #e7e2d8;border-radius:10px;padding:14px 24px;font-size:28px;font-weight:700;letter-spacing:6px;color:#2b2b2b">{{ .Token }}</span></p>
    <p style="margin:24px 0 0;font-size:12px;color:#9a9a9a">If you didn't request this, you can safely ignore this email. Need help? Contact <a href="mailto:support@whiskerville.app" style="color:#9a9a9a">support@whiskerville.app</a></p>
  </div>
</body>
</html>
