<!doctype html>
<!--
  Whiskerville — "Confirm signup" email.
  Paste into Supabase Dashboard → Authentication → Email Templates → Confirm signup.
  Uses the Supabase template variable {{ .ConfirmationURL }}.
  The logo is loaded from the deployed app (public/images/whiskerville-logo-minimum.png);
  update the absolute URL if the production domain ever changes.
  Styling mirrors supabase/functions/send-invite-email/index.ts so both emails cohere.
-->
<html>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f1eee8;padding:24px;color:#2b2b2b">
  <div style="max-width:560px;margin:0 auto;background:#fff;border:1px solid #e7e2d8;border-radius:16px;padding:32px">
    <div style="text-align:center;margin:0 0 24px">
      <img src="https://whiskerville.app/images/whiskerville-logo-minimum.png" alt="Whiskerville" width="64" style="display:block;margin:0 auto 8px;width:64px;height:auto;border:0" />
      <div style="font-size:18px;font-weight:700;color:#2b2b2b">Whiskerville</div>
    </div>
    <h1 style="font-size:22px;margin:0 0 8px">Welcome to Whiskerville!</h1>
    <p style="margin:0 0 24px;color:#5a5a5a">You're one click away from joining your rescue organization.</p>
    <p style="margin:0 0 24px"><a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#3e7b52;color:#fff;text-decoration:none;padding:12px 20px;border-radius:10px;font-weight:600">Confirm Email</a></p>
    <p style="margin:0 0 8px;font-size:13px;color:#5a5a5a">If the button doesn't work, open this link directly:</p>
    <p style="margin:0 0 24px;font-size:13px;word-break:break-all"><a href="{{ .ConfirmationURL }}" style="color:#3e7b52">{{ .ConfirmationURL }}</a></p>
    <p style="margin:24px 0 0;font-size:12px;color:#9a9a9a">Need help? Contact <a href="mailto:support@whiskerville.app" style="color:#9a9a9a">support@whiskerville.app</a></p>
  </div>
</body>
</html>
